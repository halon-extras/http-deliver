version: '2'
services:
  halon-smtpd:
    build:
      context: ./
      dockerfile: ./Dockerfile
      args:
        HALON_REPO_USER: ${HALON_REPO_USER}
        HALON_REPO_PASS: ${HALON_REPO_PASS}
    volumes:
      - ../:/http-deliver
      - ./smtpd/dist:/etc/halon
  mockserver:
    image: mockserver/mockserver:5.14.0
    environment:
      MOCKSERVER_PROPERTY_FILE: /config/mockserver.properties
    volumes:
      - type: bind
        source: ./mockserver
        target: /config
